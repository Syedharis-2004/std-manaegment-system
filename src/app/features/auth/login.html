<div class="auth-container fade-in">
  <div class="background-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <div class="glass-card auth-card">
    <div class="auth-header">
      <div class="logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4.26 10.147a60.436 60.436 0 00-.491 6.347A48.62 48.62 0 0112 20.904a48.62 48.62 0 018.232-4.41 60.46 60.46 0 00-.491-6.347m-15.482 0a50.57 50.57 0 00-2.658-.813A5.905 5.905 0 018 3.906.8.8 0 018 3h8c.3 0 .5.1.8.906a5.905 5.905 0 015.875 5.428c-.858.212-1.745.484-2.658.813m-15.482 0C4.135 10.493 5.47 11.232 7 12.012m10-1.865c1.53.78 2.865 1.52 4 2.304M7 12.012c.18.09.37.17.56.252m0 0a47.78 47.78 0 0021.996 0m-21.996 0L12 14.053l4.56-1.789m0 0c.19-.082.38-.162.56-.252" />
        </svg>
      </div>
      <h1 class="auth-title">Welcome <span class="gradient-text">Back</span></h1>
      <p class="auth-subtitle">Access the Education Management Portal</p>
    </div>

    <!-- Alert Banners -->
    <div *ngIf="errorMessage()" class="alert error-alert fade-in">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="alert-icon">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" />
      </svg>
      <span>{{ errorMessage() }}</span>
    </div>

    <div *ngIf="successMessage()" class="alert success-alert fade-in">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="alert-icon">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <span>{{ successMessage() }}</span>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="email" class="form-label">Email Address</label>
        <div class="input-wrapper">
          <input 
            id="email" 
            type="email" 
            formControlName="email" 
            class="glass-input" 
            placeholder="name@institution.edu"
            [class.input-error]="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
        </div>
        <span *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.errors?.['required']" class="error-text">
          Email is required
        </span>
        <span *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.errors?.['email']" class="error-text">
          Please enter a valid email address
        </span>
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <div class="input-wrapper">
          <input 
            id="password" 
            type="password" 
            formControlName="password" 
            class="glass-input" 
            placeholder="••••••••"
            [class.input-error]="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
        </div>
        <span *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.errors?.['required']" class="error-text">
          Password is required
        </span>
        <span *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.errors?.['minlength']" class="error-text">
          Password must be at least 6 characters
        </span>
      </div>

      <button type="submit" class="btn-primary auth-btn" [disabled]="isLoading()">
        <span *ngIf="!isLoading()">Login to Dashboard</span>
        <div *ngIf="isLoading()" class="spinner"></div>
      </button>
    </form>

    <div class="auth-footer">
      <p>Don't have an account? <a routerLink="/register" class="auth-link">Create Account</a></p>
    </div>
  </div>
</div>
